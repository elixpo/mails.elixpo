name = "elixpo-mail"
compatibility_date = "2025-12-16"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages project (dashboard + /v1 API). The SMTP sender is a SEPARATE
# Worker (Pages edge routes can't open TCP) — see spike/smtp-edge and the
# send-path architecture decision. That consumer Worker gets its own wrangler.
pages_build_output_dir = ".vercel/output/static"

# Cloudflare D1 — elixpo_mail (tenants, senders, templates, configs, delivery logs)
# Run `npm run db:create` then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "elixpo_mail"
database_id = "8a56fe2c-c668-4157-8492-7a72642f68b7"
migrations_dir = "src/workers/migrations"

# Cloudflare KV — oauth state cache, send idempotency keys, webhook replay guard
[[kv_namespaces]]
binding = "KV"
id = "8321b41a7111472ca7944506774ae628"

# Cloudflare Queue — /v1/send enqueues here; the consumer Worker does the SMTP send.
[[queues.producers]]
binding = "SEND_QUEUE"
queue = "elixpo-mail-send"

# Production environment
[env.production]
vars = { ENVIRONMENT = "production" }

  [[env.production.d1_databases]]
  binding = "DB"
  database_name = "elixpo_mail"
  database_id = "8a56fe2c-c668-4157-8492-7a72642f68b7"
  migrations_dir = "src/workers/migrations"

  [[env.production.kv_namespaces]]
  binding = "KV"
  id = "8321b41a7111472ca7944506774ae628"

  [[env.production.queues.producers]]
  binding = "SEND_QUEUE"
  queue = "elixpo-mail-send"

# Preview environment
[env.preview]
vars = { ENVIRONMENT = "preview" }

  [[env.preview.d1_databases]]
  binding = "DB"
  database_name = "elixpo_mail"
  database_id = "8a56fe2c-c668-4157-8492-7a72642f68b7"
  migrations_dir = "src/workers/migrations"

  [[env.preview.kv_namespaces]]
  binding = "KV"
  id = "8321b41a7111472ca7944506774ae628"
