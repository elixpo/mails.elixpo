name = "elixpo-mail-smtp-sender"
main = "src/index.js"
compatibility_date = "2025-09-23"
# cloudflare:sockets is a native Workers API — no flags needed.

# Secret (set via `wrangler secret put SMTP_SENDER_SECRET`, or .dev.vars locally):
#   SMTP_SENDER_SECRET — shared secret the Pages app sends as X-Sender-Secret,
#                        and that this Worker sends back when calling Pages.
#
# Where this Worker calls back to re-run the send pipeline on a retry. Point it
# at the Pages app origin (no trailing slash).
[vars]
PAGES_INTERNAL_URL = "https://mails.elixpo.com"

# Cloudflare Queue consumers. This Worker drains both queues (create them with
# `npm run queues:create`):
#   elixpo-mail-send        — a transient send failure is retried up to
#                             max_retries with CF's backoff; once exhausted the
#                             message dead-letters into the retry queue.
#   elixpo-mail-send-retry  — the bridge: a still-transient failure here is handed
#                             to MailRetryWorkflow for durable hour-scale retries.
[[queues.consumers]]
queue = "elixpo-mail-send"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "elixpo-mail-send-retry"

[[queues.consumers]]
queue = "elixpo-mail-send-retry"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

# Cloudflare Workflow — durable, long-horizon retry orchestration. Takes over
# once the queues' fast (minute-scale) retries are exhausted and re-attempts on
# an escalating schedule over ~32h before marking the delivery permanently
# failed. The class is exported from src/index.js.
[[workflows]]
name = "elixpo-mail-retry"
binding = "RETRY_WORKFLOW"
class_name = "MailRetryWorkflow"

# Observability — capture invocation + console logs of each send so failures are
# visible (dashboard → Worker → Logs, or `wrangler tail`). Takes effect on the
# next `wrangler deploy`; applies to the deployed Worker, not `wrangler dev`.
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 1
